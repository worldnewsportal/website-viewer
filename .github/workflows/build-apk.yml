name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد بيئة Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. إعداد بيئة Java لبناء تطبيقات الأندرويد
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. تجهيز مجلد الويب وتحويله عبر Capacitor
      - name: Prepare Web Assets & Capacitor
        run: |
          mkdir -p www
          cp index.html www/
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init CodeStudio com.codestudio.app --web-dir www
          npx cap add android
          npx cap sync android

      # 5. بناء ملف الـ APK باستخدام Gradle
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 6. رفع ملف الـ APK الناتج ليكون جاهزاً للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeStudio-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

