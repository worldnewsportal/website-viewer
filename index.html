<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>استوديو الويب الشامل - CodeStudio</title>
  <style>
    :root {
      --bg-main: #0f1117;
      --bg-panel: #161922;
      --bg-card: #1e222d;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* شريط التنقل العلوي */
    header {
      background-color: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo span {
      color: var(--accent);
    }

    /* أزرار التبويبات الرئيسية */
    .nav-tabs {
      display: flex;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      border: 1px solid var(--border);
    }

    .nav-tab {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* محتوى الأقسام */
    .content-area {
      flex: 1;
      display: none;
      position: relative;
      overflow: hidden;
    }

    .content-area.active {
      display: flex;
      flex-direction: column;
    }

    /* --- قسم CodePen (محرر الكود والمعاينة) --- */
    .codepen-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .editor-toolbar {
      display: flex;
      background: var(--bg-panel);
      padding: 8px 12px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .editor-btn-tab {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .editor-btn-tab.active {
      color: #fff;
      border-color: var(--accent);
      background: rgba(79, 70, 229, 0.15);
    }

    .editors-wrapper {
      flex: 1;
      position: relative;
    }

    .code-textarea {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-main);
      color: #e5e7eb;
      border: none;
      padding: 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      line-height: 1.5;
      display: none;
      direction: ltr;
      text-align: left;
    }

    .code-textarea.active {
      display: block;
    }

    .preview-box {
      flex: 1;
      background: #fff;
      border: none;
      width: 100%;
      height: 100%;
    }

    .split-view {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .workspace-top {
      height: 50%;
      display: flex;
      flex-direction: column;
    }

    .workspace-bottom {
      height: 50%;
      border-top: 2px solid var(--border);
      position: relative;
    }

    .run-bar {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
      cursor: pointer;
    }

    /* --- قسم استعراض الملفات المحلية --- */
    .files-container {
      padding: 16px;
      height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .upload-card {
      background: var(--bg-panel);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .upload-card:hover {
      border-color: var(--accent);
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      background: var(--bg-card);
      padding: 12px 16px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .file-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    /* --- قسم المتصفح الخارجي --- */
    .browser-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .url-bar-wrapper {
      padding: 10px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .url-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      direction: ltr;
    }

    .go-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span>⚡</span> CodeStudio
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchMainTab('codepen', this)">المحرر</button>
      <button class="nav-tab" onclick="switchMainTab('files', this)">الملفات</button>
      <button class="nav-tab" onclick="switchMainTab('browser', this)">متصفح</button>
    </div>
  </header>

  <!-- 1. قسم CodePen (محرر ومعاينة مباشرة) -->
  <div id="tab-codepen" class="content-area active">
    <div class="split-view">
      <div class="workspace-top">
        <div class="editor-toolbar">
          <button class="editor-btn-tab active" onclick="switchEditorTab('html', this)">HTML</button>
          <button class="editor-btn-tab" onclick="switchEditorTab('css', this)">CSS</button>
          <button class="editor-btn-tab" onclick="switchEditorTab('js', this)">JS</button>
        </div>
        <div class="editors-wrapper">
          <textarea id="code-html" class="code-textarea active" placeholder="اكتب كود HTML هنا..."><h1>مرحباً بك في CodeStudio</h1>
<p>قم بتعديل الكود وشاهد النتيجة فوراً!</p></textarea>
          <textarea id="code-css" class="code-textarea" placeholder="اكتب كود CSS هنا...">body {
  background: #f0f2f5;
  color: #333;
  font-family: sans-serif;
  padding: 20px;
  text-align: center;
}
h1 { color: #4f46e5; }</textarea>
          <textarea id="code-js" class="code-textarea" placeholder="اكتب كود JavaScript هنا..."></textarea>
        </div>
      </div>
      <div class="workspace-bottom">
        <button class="run-bar" onclick="updatePreview()">تحديث المعاينة 🔄</button>
        <iframe id="preview-frame" class="preview-box"></iframe>
      </div>
    </div>
  </div>

  <!-- 2. قسم الملفات المحلية (دعم عدد غير محدود من الملفات) -->
  <div id="tab-files" class="content-area">
    <div class="files-container">
      <div class="upload-card" onclick="document.getElementById('file-picker').click()">
        <h3>📁 اختر ملفات HTML أو مجلد كامل</h3>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 6px;">اضغط هنا لاختيار ملف واحد أو آلاف الملفات لعرضها وتشغيلها</p>
        <input type="file" id="file-picker" multiple accept=".html,.htm,.css,.js,.png,.jpg" style="display: none" onchange="handleFiles(this.files)">
      </div>
      <div id="file-list" class="file-list">
        <!-- ستظهر الملفات المرفوعة هنا -->
      </div>
    </div>
  </div>

  <!-- 3. قسم المتصفح الخارجي (فتح أي موقع) -->
  <div id="tab-browser" class="content-area">
    <div class="browser-container">
      <div class="url-bar-wrapper">
        <input type="text" id="url-input" class="url-input" placeholder="اكتب رابط الموقع (مثال: https://google.com)" value="https://example.com">
        <button class="go-btn" onclick="loadUrl()">انتقال</button>
      </div>
      <iframe id="browser-frame" class="preview-box" src="https://example.com"></iframe>
    </div>
  </div>

  <script>
    // التنقل بين الأقسام الرئيسية
    function switchMainTab(tabName, btn) {
      document.querySelectorAll('.content-area').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      btn.classList.add('active');
      if(tabName === 'codepen') {
        updatePreview();
      }
    }

    // التنقل بين لغات المحرير (HTML, CSS, JS)
    function switchEditorTab(lang, btn) {
      document.querySelectorAll('.code-textarea').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.editor-btn-tab').forEach(el => el.classList.remove('active'));
      document.getElementById('code-' + lang).classList.add('active');
      btn.classList.add('active');
    }

    // تحديث المعاينة الحية (مثل CodePen)
    function updatePreview() {
      const html = document.getElementById('code-html').value;
      const css = document.getElementById('code-css').value;
      const js = document.getElementById('code-js').value;
      
      const frame = document.getElementById('preview-frame');
      const doc = frame.contentDocument || frame.contentWindow.document;
      
      doc.open();
      doc.write(`
        <!DOCTYPE html>
        <html>
        <head><style>${css}</style></head>
        <body>
          ${html}
          <script>
            try {
              ${js}
            } catch(e) {
              console.error(e);
            }
          <\/script>
        </body>
        </html>
      `);
      doc.close();
    }

    // إدارة الملفات المحلية
    let loadedFiles = {};
    function handleFiles(files) {
      const listContainer = document.getElementById('file-list');
      listContainer.innerHTML = '';
      
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        loadedFiles[file.name] = file;
        
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `<span>📄 ${file.name}</span> <span style="color: var(--accent); font-size: 0.8rem;">فتح المعاينة</span>`;
        item.onclick = () => openLocalFile(file);
        listContainer.appendChild(item);
      }
    }

    function openLocalFile(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const content = e.target.result;
        const frame = document.getElementById('preview-frame');
        
        // التحويل التلقائي للقسم الرئيسي للمعاينة
        switchMainTab('codepen', document.querySelectorAll('.nav-tab')[0]);
        
        const doc = frame.contentDocument || frame.contentWindow.document;
        doc.open();
        doc.write(content);
        doc.close();
      };
      reader.readAsText(file);
    }

    // تحميل المواقع في المتصفح
    function loadUrl() {
      let url = document.getElementById('url-input').value.trim();
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      document.getElementById('browser-frame').src = url;
    }

    // تشغيل المعاينة أول ما يفتح التطبيق
    window.onload = function() {
      updatePreview();
    };
  </file_content> <!-- تلميح التصحيح -->
</body>
  </html>
